version: 2

# StepSecurity Secure Registry auth for manifests that inherit
# mainsite-frontend/.npmrc.
registries:
  stepsecurity-javascript:
    type: npm-registry
    url: https://registry.stepsecurity.io/javascript
    token: ${{ secrets.DEPENDABOT_STEPSECURITY_NPM_TOKEN }}

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "npm"
      - "public-format"
    commit-message:
      prefix: "deps"
      include: "scope"
    versioning-strategy: increase
    groups:
      public-format-tooling:
        patterns:
          - "prettier"
        update-types:
          - "major"
          - "minor"
          - "patch"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/mainsite-frontend"
    registries:
      - stepsecurity-javascript
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "npm"
      - "frontend"
    commit-message:
      prefix: "deps"
      include: "scope"
    versioning-strategy: increase
    groups:
      pwa-build-chain:
        patterns:
          - "vite-plugin-pwa"
          - "workbox*"
          - "rollup-plugin-visualizer"
          - "@rollup/*"
          - "rollup"
          - "magic-string"
          - "source-map"
          - "glob"
        update-types:
          - "major"
          - "minor"
          - "patch"
      dev-dependencies:
        patterns:
          - "eslint*"
          - "typescript"
          - "@types/*"
          - "wrangler"
          - "@cloudflare/*"
          - "vite*"
          - "@vitest/*"
          - "@biomejs/*"
        exclude-patterns:
          - "vite-plugin-pwa"
        update-types:
          - "major"
          - "minor"
          - "patch"
      tanstack:
        patterns:
          - "@tanstack/*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      eslint-ecosystem:
        patterns:
          - "@eslint/*"
          - "eslint-plugin-*"
          - "typescript-eslint"
        update-types:
          - "major"
          - "minor"
          - "patch"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/mainsite-worker"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "npm"
      - "worker"
    commit-message:
      prefix: "deps"
      include: "scope"
    versioning-strategy: increase
    groups:
      dev-dependencies:
        patterns:
          - "eslint*"
          - "typescript"
          - "@types/*"
          - "wrangler"
          - "@cloudflare/*"
          - "vite*"
          - "@vitest/*"
          - "@biomejs/*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      eslint-ecosystem:
        patterns:
          - "@eslint/*"
          - "eslint-plugin-*"
          - "typescript-eslint"
        update-types:
          - "major"
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
