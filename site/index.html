<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Mainsite App - LCV Ideas &amp; Software</title>
    <meta
      name="description"
      content="Página pública do Mainsite App, projeto que opera o site Reflexos da Alma."
    />
    <meta name="robots" content="noindex,follow" />
    <style>
      :root {
        --bg: #f4f1ea;
        --fg: #202124;
        --muted: #5f6b7a;
        --card: rgba(255, 255, 255, 0.78);
        --border: rgba(70, 83, 101, 0.18);
        --accent: #1d4ed8;
        --accent-strong: #0f766e;
        --shadow: rgba(32, 33, 36, 0.12);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --fg: #f2f5f9;
          --muted: #aab5c4;
          --card: rgba(17, 24, 39, 0.76);
          --border: rgba(230, 236, 244, 0.16);
          --accent: #93c5fd;
          --accent-strong: #5eead4;
          --shadow: rgba(0, 0, 0, 0.36);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 18px;
        color: var(--fg);
        background:
          radial-gradient(
            circle at 16% 18%,
            rgba(15, 118, 110, 0.18),
            transparent 32%
          ),
          radial-gradient(
            circle at 84% 12%,
            rgba(29, 78, 216, 0.16),
            transparent 30%
          ),
          linear-gradient(
            135deg,
            var(--bg),
            color-mix(in srgb, var(--bg) 86%, var(--accent) 14%)
          );
        font:
          16px/1.6 Georgia,
          "Times New Roman",
          serif;
      }

      main {
        width: min(760px, 100%);
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--card);
        box-shadow: 0 24px 70px var(--shadow);
        padding: clamp(28px, 6vw, 56px);
        text-align: center;
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--accent-strong);
        font:
          700 0.78rem/1.2 Verdana,
          sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: var(--fg);
        font-size: clamp(2.3rem, 8vw, 4.8rem);
        line-height: 0.95;
        letter-spacing: -0.055em;
      }

      p {
        margin: 22px auto 0;
        max-width: 56ch;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.15rem);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-top: 34px;
      }

      a {
        color: inherit;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 20px;
        border-radius: 999px;
        border: 1px solid var(--border);
        text-decoration: none;
        font:
          700 0.95rem/1 Verdana,
          sans-serif;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          background 160ms ease;
      }

      .button:hover {
        transform: translateY(-2px);
        border-color: color-mix(in srgb, var(--accent) 60%, var(--border));
      }

      .button--primary {
        border-color: transparent;
        background: var(--fg);
        color: var(--bg);
      }

      footer {
        margin-top: 34px;
        color: var(--muted);
        font-size: 0.88rem;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">LCV Ideas &amp; Software</p>
      <h1>Mainsite App</h1>
      <p>
        Projeto responsável pela experiência pública do Reflexos da Alma:
        leitura, arquivo, contato, comentários, moderação e assistente de
        reflexão.
      </p>
      <div class="actions" aria-label="Links do projeto">
        <a
          class="button button--primary"
          href="https://www.reflexosdaalma.blog/"
          >Abrir Reflexos da Alma</a
        >
        <a
          class="button"
          href="https://github.com/LCV-Ideas-Software/mainsite-app"
          >Ver repositório</a
        >
      </div>
      <footer>© LCV Ideas &amp; Software</footer>
    </main>
  </body>
</html>
